<html lang="en">
<head>

    <style>
        header {  
            height: 75px;
            color: white;
            background-color: teal;
            font-weight: bold;
            position: fixed;
            top: 0;
            width: 100%;
            left:0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    
        * {
        box-sizing: border-box;
        }
        
        .box1::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera*/
        }
        a{
            text-decoration: none;
            font-style:none;
            color:black;
        }
        .main-box{
            margin:0px auto;
            width:800px;
            height:75%;
            border: 2px solid black;
        }
        .up-box{
            margin:0px auto;
            width:800px;
            height:50px;
            border: 2px solid black;
        }
        li{
            list-style: none;
        }
    </style>
</head>
<body>
    <header>
        <h1 style="margin:30px;font-size: 3em; color:orange;">공유</h1>
